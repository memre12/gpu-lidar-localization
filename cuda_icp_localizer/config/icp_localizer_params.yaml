# cuda_icp_localizer configuration
# 
# Default parameters for the ICP localizer node.
# Override these in launch files or via command line.

icp_localizer:
  ros__parameters:
    # Input/Output Topics
    source_topic: "/lidar_front/points_in"           # Input LiDAR point cloud topic
    aligned_cloud_topic: "/icp_localizer/aligned_cloud"
    pose_topic: "/icp_localizer/estimated_pose"
    
    # Target Configuration
    # Download the map (gazebo_map.pcd) from the Drive link in the README
    # and point this to where you saved it. Empty = use first cloud as map.
    target_pcd_file: "/home/emre/ws_gae/src/launch/map/sim_map/gazebo_map.pcd"
    
    # Algorithm Parameters
    max_iterations: 60                       # Maximum ICP iterations (stops early on convergence)
    convergence_threshold: 0.005            # Stop when per-iteration motion falls below this (m + rad)
    max_points: 150000                       # Maximum source points to process
    max_target_points: 50000                 # Maximum target (map) points on GPU
    downsample_size: 0.1                    # Voxel size for map downsampling (meters)
    local_map_radius: 60.0                  # Radius (m) of the map crop kept on the GPU
    max_scan_range: 45.0                    # Drop scan points beyond this range (m)
    min_scan_range: 1.5                     # Drop scan points closer than this (ego-vehicle hits)
    correspondence_max_dist: 5.0            # Reject ICP pairs farther apart than this (m)
    
    # Transform Broadcasting
    publish_tf: true                        # Publish TF transformations
    target_frame: "map"                     # Target/reference frame
    source_frame: "lidar_front"               # Source/moving frame
    
    # Initial Pose
    # true  -> localization starts automatically from the pose below
    # false -> waits until a pose is set via RViz "2D Pose Estimate" (/initialpose)
    # In both modes a new /initialpose message re-initializes the localizer.
    use_initial_pose: true
    initial_x: 179.123                      # Auto-start X position (meters)
    initial_y: 112.539                      # Auto-start Y position (meters)
    initial_z: 0.0                          # Auto-start Z position (meters)
    initial_roll: 0.0                       # Auto-start roll (radians)
    initial_pitch: 0.0                      # Auto-start pitch (radians)
    initial_yaw: -1.54457                   # Auto-start yaw (radians)
